<!DOCTYPE html>
<html>
<head>
<title>JavaScript Tasks</title>
<link rel="stylesheet" type="text/css" href="assignment2.css">

</head>

<body>

<div class="container">

<h2>1. Even Numbers from 1 to 100</h2>
<button onclick="showEven()">Show Even Numbers</button>
<div class="result" id="evenResult"></div>


<h2>2. Calculator using Switch</h2>

<input type="number" id="num1" placeholder="First number">
<input type="number" id="num2" placeholder="Second number">

<select id="operation">
<option value="+">Add</option>
<option value="-">Subtract</option>
<option value="*">Multiply</option>
<option value="/">Divide</option>
</select>

<button onclick="calculate()">Calculate</button>

<div class="result" id="calcResult"></div>


<h2>3. Salary Tax Calculator</h2>

<input type="number" id="salary" placeholder="Enter Salary">

<button onclick="findTax()">Calculate Tax</button>

<div class="result" id="taxResult"></div>


<h2>4. Sum of Product of Digits</h2>

<input type="number" id="n1" placeholder="First Number">
<input type="number" id="n2" placeholder="Second Number">

<button onclick="digitProduct()">Calculate</button>

<div class="result" id="digitResult"></div>

</div>


<script src="assignment2.js">

</script>

</body>
</html>
